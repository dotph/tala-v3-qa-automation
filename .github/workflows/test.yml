name: Test

# Manual trigger only for the first cut — mdot.ph is staging and hitting it on every PR
# would be noisy. Promote to `pull_request` / `push` once the workflow has been observed
# running cleanly.
on:
  workflow_dispatch:
    inputs:
      testEnv:
        description: 'Test environment'
        required: true
        default: 'MDOT'
        type: choice
        options:
          - MDOT
          - PRODUCTION
      exchangeRate:
        description: 'USD → PHP exchange rate'
        required: true
        default: '60.50'
      tags:
        description: 'Cucumber tag expression (optional, e.g. "@smoke and @pricing")'
        required: false
        default: ''

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Read Playwright Java version from pom.xml
        id: pw-version
        # Reads the <playwright.version> property from pom.xml directly with
        # grep + sed (no `mvn help:evaluate` needed, so this is fast and
        # works before the Maven cache is warm). Output is consumed by the
        # cache step below as part of the cache key.
        run: |
          PW_VERSION=$(grep '<playwright.version>' pom.xml \
            | sed -e 's/.*<playwright.version>//' -e 's/<\/playwright.version>.*//' \
            | tr -d '[:space:]')
          if [ -z "$PW_VERSION" ]; then
            echo "::error::Could not read <playwright.version> from pom.xml"
            exit 1
          fi
          echo "Playwright Java version: $PW_VERSION"
          echo "version=$PW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/pw-browsers-java
          # Key is derived from the <playwright.version> property in pom.xml,
          # so bumping the dependency in pom.xml auto-invalidates this cache
          # and forces a re-install of the matching browsers.
          key: pw-browsers-java-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        # PLAYWRIGHT_BROWSERS_PATH is exported INSIDE the run script (where
        # bash expands $HOME) rather than under `env:` — YAML env values are
        # not shell-expanded, so a literal `~` would land browsers in a
        # `./~/.cache/...` directory instead of the cached path. See run
        # 28081807050 for the original symptom.
        run: |
          export PLAYWRIGHT_BROWSERS_PATH="$HOME/.cache/pw-browsers-java"
          mvn -B exec:java -e \
            -Dexec.mainClass="com.microsoft.playwright.CLI" \
            -Dexec.args="install --with-deps chromium"

      - name: Run tests (headless)
        run: |
          mvn -B test \
            -Dheadless=true \
            -DtestEnv=${{ inputs.testEnv }} \
            -DexchangeRate=${{ inputs.exchangeRate }} \
            ${{ inputs.tags && format('-Dcucumber.filter.tags="{0}"', inputs.tags) || '' }}

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/
          if-no-files-found: warn

      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traces
          path: traces/
          if-no-files-found: ignore

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          if-no-files-found: ignore
