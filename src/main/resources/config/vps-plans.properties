# VPS monthly pricing and plan labels (USD, tax-exclusive).
#
# Loaded by config.VpsPlan at class-load time. Externalised from Java
# so a stakeholder reviewing the test spec can see the expected amounts
# without opening an enum — the .feature file references each plan by
# label and asserts "the {plan} plan displays the monthly price", which
# resolves against the values below.
#
# Keep in sync with the live prices on https://mdot.ph/vps.

plan.middleweight.label=MiddleWeight VPS
plan.middleweight.monthlyPrice=175.00

plan.cruiserweight.label=CruiserWeight VPS
plan.cruiserweight.monthlyPrice=325.00

plan.heavyweight.label=HeavyWeight VPS
plan.heavyweight.monthlyPrice=650.00
